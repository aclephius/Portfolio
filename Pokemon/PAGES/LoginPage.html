<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokestar - Login</title>
  <link rel="stylesheet" href="Style\LoginPage.css">
  <script src="JS\LoginPage.js" defer></script>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo-section">
        <h1 class="game-title">POKESTAR</h1>
        <p class="tagline">Your Pokémon adventure awaits</p>
      </div>

      <div class="tabs">
        <button id="loginTab" class="tab active">Sign In</button>
        <button id="registerTab" class="tab">Create Account</button>
      </div>

      <form id="authForm" class="auth-form">
        <div class="input-group">
          <input type="text" id="username" name="username" placeholder="Username" required>
        </div>
        
        <div class="input-group">
          <input type="password" id="password" name="password" placeholder="Password" required>
        </div>

        <div id="message" class="message hidden"></div>

        <button type="submit" class="submit-btn">
          <span id="btnText">Sign In</span>
        </button>
      </form>

      <div class="divider">
        <span>or</span>
      </div>

      <a href="index.html" class="guest-btn">Continue as Guest</a>
    </div>

    <p class="footer">© 2026 Pokestar</p>
  </div>
</body>
</html>
