<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokestar - Profile</title>
  <link rel="stylesheet" href="Style\ProfilePage.css">
  <script src="JS\coins.js" defer></script>
  <script src="JS\ProfilePage.js" defer></script>
</head>
<body>

<div class="profile-container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">PLAYER PROFILE</div>
    <a href="index.html" class="back-link">← Back to Game</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- LEFT CARD -->
    <div class="card user-card">
      <div class="avatar">👤</div>

      <div id="profilePlayerName" class="username">Trainer</div>
      <div class="tag">TRAINER</div>

      <div class="stats">
        <div><span>Level</span> <b id="profileLevel">0</b></div>
        <div><span>Coins</span> <b id="profileCoins">0</b></div>
        <div><span>Wins</span> <b id="profileWins">0</b></div>
        <div><span>Losses</span> <b id="profileLosses">0</b></div>
      </div>
    </div>

    <!-- RIGHT CARD -->
    <div class="card info-card">

      <h2>Trainer Info</h2>
        <div class="info-row">
        <span>Pokedex</span>
        <b id="profilePokedex">0</b>
      </div>

      <div class="info-row">
        <span>PlayerID</span>
        <b id="profilePlayerId">N/A</b>
      </div>

      <div class="info-row">
        <span>Status</span>
        <b id="profileStatus">Active</b>
      </div>

      <div class="button-group">
        <button class="edit-btn">EDIT PROFILE</button>
        <button class="Back-btn" onclick="window.location.href='index.html'">Back to Game</button>
      </div>

    </div>

  </div>
